name: package-android-twa

# Builds an UNSIGNED Android TWA (APK + AAB) wrapping https://janaushdhi.oriz.in
# via Bubblewrap, and attaches the artifacts to the prerelease that triggered it.
# NOTE: artifacts are UNSIGNED — signing keys are a deliberate blocker (never
# generated or committed here). Sign locally / in Play Console before install.

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: package-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  twa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install Bubblewrap
        run: npm i -g @bubblewrap/cli@1.24.1
      - name: Init TWA from live manifest
        env:
          MANIFEST: https://janaushdhi.oriz.in/manifest.webmanifest
        run: |
          bubblewrap init --manifest "$MANIFEST" --directory twa <<'EOF'
          janaushdhi.oriz.in


          EOF
      - name: Build unsigned APK + AAB
        working-directory: twa
        run: |
          chmod +x ./gradlew || true
          ./gradlew assembleRelease bundleRelease
          find . -name '*-release-unsigned.apk' -o -name '*-release.aab' | tee ../artifacts.txt
      - name: Collect artifacts
        run: |
          mkdir -p out
          while read -r f; do cp "$f" out/ 2>/dev/null || true; done < artifacts.txt
          ls -la out || true
      - name: Attach to prerelease
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: out/*
